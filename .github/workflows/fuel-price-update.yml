name: Daily Fuel Price Update

on:
  # Daily automatic schedule DISABLED per Ramesh's decision (peace of mind
  # around scraping goodreturns.in — see conversation on 22 Jul 2026).
  # Fuel prices are now entered manually via the app's admin panel.
  # If you ever want to re-enable daily automation, uncomment below:
  # schedule:
  #   - cron: '30 1 * * *'  # 7:00 AM IST
  workflow_dispatch: {}  # still allows a manual "Run workflow" trigger if wanted

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fuel price update script
        env:
          FUELBOT_EMAIL: ${{ secrets.FUELBOT_EMAIL }}
          FUELBOT_PASSWORD: ${{ secrets.FUELBOT_PASSWORD }}
        run: python3 scripts/update_fuel_prices.py
