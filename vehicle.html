<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Info — Garage Book Pro</title>
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:#0A0A0A; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; min-height:100vh; padding:20px 16px 40px;}
  .header{display:flex; align-items:center; gap:10px; margin-bottom:20px;}
  .header .logo{font-size:26px;}
  .header h1{font-size:20px; color:#FFC800; font-weight:800;}
  .card{background:#161616; border:1px solid #262626; border-radius:14px; padding:18px; margin-bottom:14px;}
  .vname{font-size:24px; font-weight:800; color:#fff;}
  .vreg{color:#888; font-size:13px; margin-top:2px;}
  .row{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #222;}
  .row:last-child{border-bottom:none;}
  .row .label{color:#aaa; font-size:13.5px;}
  .row .val{color:#fff; font-weight:700; font-size:14px;}
  .badge{padding:4px 10px; border-radius:8px; font-size:12px; font-weight:700;}
  .badge.ok{background:#0F2E1A; color:#2ECC71;}
  .badge.warn{background:#332400; color:#FFC800;}
  .badge.overdue{background:#3A0E0E; color:#FF6B6B;}
  .loading, .error{text-align:center; padding:60px 20px; color:#888;}
  .cta{background:linear-gradient(135deg,#1A1400,#0A0A0A); border:1px solid #FFC800; border-radius:14px; padding:18px; text-align:center; margin-top:20px;}
  .cta a{display:inline-block; margin-top:10px; background:#FFC800; color:#0A0A0A; padding:12px 24px; border-radius:10px; font-weight:800; text-decoration:none; font-size:14px;}
  .footer{text-align:center; color:#555; font-size:11.5px; margin-top:24px;}
</style>
</head>
<body>

<div class="header">
  <span class="logo">🏍️</span>
  <h1>Garage Book Pro</h1>
</div>

<div id="content">
  <div class="loading">Loading vehicle details...</div>
</div>

<div class="footer">Generated by Garage Book Pro · garagebookpro.in</div>

<script>
const params = new URLSearchParams(window.location.search);
const vid = params.get('v');
const content = document.getElementById('content');

function fmtDate(d){
  if(!d) return null;
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
}
function daysUntil(d){
  if(!d) return null;
  const dt = new Date(d + 'T00:00:00');
  return Math.ceil((dt - new Date()) / 86400000);
}
function expiryBadge(dateStr){
  const days = daysUntil(dateStr);
  if(days==null) return '<span class="badge warn">Not set</span>';
  if(days < 0) return '<span class="badge overdue">Expired</span>';
  if(days <= 30) return '<span class="badge warn">' + days + ' நாள்-ல expire</span>';
  return '<span class="badge ok">Valid</span>';
}

if(!vid){
  content.innerHTML = '<div class="error">⚠️ Invalid link — vehicle ID missing.</div>';
} else {
  fetch('https://garagebookpro-default-rtdb.asia-southeast1.firebasedatabase.app/publicVehicleInfo/' + vid + '.json')
    .then(res => res.json())
    .then(data => {
      if(!data){
        content.innerHTML = '<div class="error">⚠️ Vehicle info கிடைக்கல. Owner-ஐ QR-ஐ refresh பண்ண சொல்லுங்க.</div>';
        return;
      }
      let serviceBadge = '<span class="badge ok">Up to date</span>';
      if(data.serviceOverdue) serviceBadge = '<span class="badge overdue">Overdue</span>';
      else if(data.serviceDueSoon) serviceBadge = '<span class="badge warn">Due Soon</span>';

      content.innerHTML = `
        <div class="card">
          <div class="vname">${data.name || 'Vehicle'}</div>
          ${data.regNo ? `<div class="vreg">${data.regNo}</div>` : ''}
        </div>
        <div class="card">
          <div class="row"><span class="label">🛣️ Current Odometer</span><span class="val">${data.odometer!=null ? data.odometer + ' km' : '—'}</span></div>
          <div class="row"><span class="label">🔧 Service Status</span>${serviceBadge}</div>
          <div class="row"><span class="label">📄 Insurance</span>${expiryBadge(data.insuranceExpiry)}</div>
          <div class="row"><span class="label">🌫️ PUC</span>${expiryBadge(data.pucExpiry)}</div>
          <div class="row"><span class="label">🪪 RC</span>${expiryBadge(data.rcExpiry)}</div>
        </div>
        <div class="cta">
          <div style="color:#fff; font-size:13.5px;">Vehicle expense & service tracking free-ஆ try பண்ணுங்க</div>
          <a href="https://garagebookpro.in/">Garage Book Pro App</a>
        </div>
      `;
    })
    .catch(() => {
      content.innerHTML = '<div class="error">⚠️ Load பண்ண முடியல. Internet check பண்ணுங்க.</div>';
    });
}
</script>
</body>
</html>
